restricted_paths:
  - ".github/workflows/"
  - "CONTROL.md"
  - "AGENTS.md"
  - "ecosystem.yml"
  - "**/.env"
  - "**/secrets*"
  - "**/deploy*"
  - "**/release*"

requires_human_review:
  - "brain/decisions/"
  - "control/rules/"
  - "control/risk-register/"
  - "systems/*/status.md"

state_classification:
  restricted:
    - "state/intelligence-rules.yml"
    - "state/intelligence-scan.yml"
  review_required:
    - "state/active-systems.yml"
  operational_generated:
    - "state/active-sprint.yml"
    - "state/dashboard-state.yml"
    - "state/memory-index.yml"
