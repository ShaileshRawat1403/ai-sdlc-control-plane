name: State & Dashboard Refresh

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: state-refresh
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: systems/toolsmith

      - name: Run Dashboard Refresh
        run: bun run systems/toolsmith/scripts/dashboard-refresh.ts

      - name: Run Memory Refresh
        run: bun run systems/toolsmith/scripts/memory-refresh.ts

      - name: Run Evidence Completeness Agent
        run: bun run systems/toolsmith/scripts/intelligence/evidence-completeness.ts

      - name: Run Decision Gap Agent
        run: bun run systems/toolsmith/scripts/intelligence/decision-gap.ts

      - name: Run Weekly Operator Brief Agent
        run: bun run systems/toolsmith/scripts/intelligence/weekly-operator-brief.ts

      - name: Commit state changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add dashboard/ memory/active-context.md bench/agent-runs/ state/intelligence-scan.yml brain/decisions/drafts/ bench/validation/evidence-index.md
          git commit -m "automation: refresh dashboards, memory, and advisory intelligence" || echo "No changes"
          git push
