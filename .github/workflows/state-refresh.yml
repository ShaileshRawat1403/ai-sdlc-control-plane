name: State & Dashboard Refresh

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: state-refresh
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: systems/toolsmith

      - name: Run Dashboard Refresh
        run: bun run systems/toolsmith/scripts/dashboard-refresh.ts

      - name: Run Memory Refresh
        run: bun run systems/toolsmith/scripts/memory-refresh.ts

      - name: Commit state changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add dashboard/ memory/active-context.md bench/agent-runs/
          git commit -m "automation: refresh dashboards and memory context" || echo "No changes"
          git push
